<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#ffb673"/>
    </marker>
    <style>
      .bg { fill: #120f0f; }
      .panel { fill: #1f1816; stroke: rgba(255, 182, 115, 0.28); stroke-width: 2; }
      .state { fill: #231b19; stroke: #ffb673; stroke-width: 3; }
      .dead { fill: #2a1417; stroke: #ff7a45; stroke-width: 3; }
      .title { fill: #f8f1e9; font: 700 30px 'Trebuchet MS', sans-serif; }
      .label { fill: #f8f1e9; font: 700 20px 'Trebuchet MS', sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .text { fill: #d8c2b2; font: 15px 'Trebuchet MS', sans-serif; }
      .line { stroke: #ffb673; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" rx="24"/>
  <rect class="panel" x="24" y="24" width="1152" height="672" rx="24"/>
  <text class="title" x="52" y="70">DeadVector Zombie FSM</text>

  <circle class="state" cx="190" cy="180" r="78"/>
  <text class="label" x="190" y="180">SPAWN</text>

  <circle class="state" cx="470" cy="180" r="78"/>
  <text class="label" x="470" y="180">WANDER</text>

  <circle class="state" cx="760" cy="180" r="78"/>
  <text class="label" x="760" y="180">CHASE</text>

  <circle class="state" cx="1020" cy="180" r="78"/>
  <text class="label" x="1020" y="180">ATTACK</text>

  <circle class="state" cx="760" cy="460" r="78"/>
  <text class="label" x="760" y="460">RETREAT</text>

  <circle class="dead" cx="470" cy="460" r="78"/>
  <text class="label" x="470" y="460">DEAD</text>

  <path class="line" d="M40 180H96"/>
  <text class="text" x="48" y="160">initial state</text>

  <path class="line" d="M268 180H392"/>
  <text class="text" x="290" y="158">spawn timer done</text>

  <path class="line" d="M548 180H682"/>
  <text class="text" x="570" y="158">player in notice range</text>

  <path class="line" d="M838 180H942"/>
  <text class="text" x="850" y="158">player in attack range</text>

  <path class="line" d="M970 244C938 330 882 372 814 402"/>
  <text class="text" x="886" y="322">low health after attack</text>

  <path class="line" d="M690 460H548"/>
  <text class="text" x="578" y="438">health &lt;= 0</text>

  <path class="line" d="M696 220C624 288 584 334 540 392"/>
  <text class="text" x="574" y="300">health &lt;= 0</text>

  <path class="line" d="M960 460C1032 400 1062 324 1040 244"/>
  <text class="text" x="1032" y="330">retreat timer ends</text>

  <path class="line" d="M686 154C624 120 564 110 516 128"/>
  <text class="text" x="560" y="100">player lost</text>

  <path class="line" d="M430 420C334 362 294 288 358 220"/>
  <text class="text" x="286" y="324">blood burst and fade</text>

  <path class="line" d="M818 400C876 346 904 286 874 226"/>
  <text class="text" x="906" y="276">counterattack window</text>

  <text class="text" x="54" y="658">Shared transition: any active state can move to DEAD when health reaches zero.</text>
</svg>
