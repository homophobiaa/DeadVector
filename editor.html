<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadVector — Map Obstacle Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #ccc;
    font-family: 'Segoe UI', Consolas, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ---- Sidebar ---- */
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: #1a1a1a;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar h1 {
    font-size: 15px;
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    color: #ff4444;
    letter-spacing: 1px;
  }
  #sidebar h1 span { color: #888; font-weight: 400; font-size: 12px; }

  .toolbar {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid #333;
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 6px 12px;
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }
  .toolbar button:hover { background: #383838; }
  .toolbar button.danger { border-color: #a33; color: #f88; }
  .toolbar button.danger:hover { background: #4a1a1a; }
  .toolbar button.primary { border-color: #3a3; color: #8f8; }
  .toolbar button.primary:hover { background: #1a3a1a; }

  /* ---- Obstacle list ---- */
  #obstacle-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .obs-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    font-size: 12px;
    transition: background 0.1s;
  }
  .obs-item:hover { background: #222; }
  .obs-item.selected { background: #1a2a1a; border-left-color: #4f4; }
  .obs-item .dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: #f44;
    flex-shrink: 0;
  }
  .obs-item .lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .obs-item .coords { color: #666; font-size: 10px; font-family: Consolas, monospace; }

  /* ---- Properties panel ---- */
  #props {
    border-top: 1px solid #333;
    padding: 12px;
    background: #1c1c1c;
  }
  #props h3 { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  #props .row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  #props label {
    font-size: 11px;
    color: #999;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  #props input[type="number"], #props input[type="text"] {
    flex: 1;
    background: #222;
    border: 1px solid #444;
    color: #eee;
    padding: 4px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: Consolas, monospace;
  }
  #props input[type="number"]:focus, #props input[type="text"]:focus {
    outline: none;
    border-color: #5a5;
  }
  #no-selection { color: #555; font-size: 12px; font-style: italic; }

  /* ---- Export panel ---- */
  #export-panel {
    border-top: 1px solid #333;
    padding: 10px 12px;
    background: #181818;
  }
  #export-panel textarea {
    width: 100%;
    height: 100px;
    background: #0e0e0e;
    color: #8f8;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px;
    font-size: 11px;
    font-family: Consolas, monospace;
    resize: vertical;
  }
  #export-panel .row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  #export-panel button {
    flex: 1;
    padding: 6px;
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  #export-panel button:hover { background: #383838; }
  #export-panel button.copy { border-color: #3a3; color: #8f8; }
  #export-panel button.copy:hover { background: #1a3a1a; }

  /* ---- Canvas area ---- */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
  }
  #canvas-wrap canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ---- Tooltips ---- */
  #tooltip {
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 3px;
    pointer-events: none;
    display: none;
    z-index: 100;
  }

  /* ---- Help bar ---- */
  #helpbar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #888;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 4px;
    pointer-events: none;
    white-space: nowrap;
  }
  #helpbar kbd {
    background: #333;
    padding: 1px 5px;
    border-radius: 2px;
    color: #bbb;
    font-family: Consolas, monospace;
    font-size: 10px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>OBSTACLE EDITOR <span>DeadVector</span></h1>

  <div class="toolbar">
    <button id="btn-add" class="primary">+ Add</button>
    <button id="btn-dup">Duplicate</button>
    <button id="btn-del" class="danger">Delete</button>
    <button id="btn-clear" class="danger">Clear All</button>
  </div>

  <div id="obstacle-list"></div>

  <div id="props">
    <h3>Properties</h3>
    <div id="props-content">
      <div id="no-selection">Click an obstacle to select</div>
    </div>
  </div>

  <div id="export-panel">
    <textarea id="export-box" spellcheck="false" placeholder="Exported data will appear here..."></textarea>
    <div class="row">
      <button id="btn-copy" class="copy">Copy to Clipboard</button>
      <button id="btn-import">Import / Paste</button>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="helpbar">
    <kbd>Click</kbd> select &nbsp;
    <kbd>Drag</kbd> move &nbsp;
    <kbd>Edges</kbd> resize &nbsp;
    <kbd>Del</kbd> delete &nbsp;
    <kbd>Ctrl+D</kbd> duplicate &nbsp;
    <kbd>Ctrl+A</kbd> add
  </div>
</div>

<div id="tooltip"></div>

<script>
// ====== State ======
const BG_SRC = "assets/images/background.png";
const HANDLE_SIZE = 7;
const ZOOM = 1.12;

let obstacles = [];
let selectedIdx = -1;
let bgImg = new Image();
let bgTransform = { x: 0, y: 0, w: 0, h: 0 };

// Drag state
let dragMode = null;   // "move" | "n" | "s" | "e" | "w" | "ne" | "nw" | "se" | "sw"
let dragStart = null;  // {mx, my, ox, oy, ow, oh}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const wrap = document.getElementById("canvas-wrap");

// Default obstacles are loaded at startup from map-data.json.
let DEFAULT_OBSTACLES = [];

// ====== Init ======
async function init() {
  try {
    DEFAULT_OBSTACLES = await fetch("js/map-data.json").then(r => r.json());
  } catch { DEFAULT_OBSTACLES = []; }
  // Try to load from localStorage, fall back to defaults
  const saved = localStorage.getItem("dv_editor_obstacles");
  if (saved) {
    try { obstacles = JSON.parse(saved); } catch { obstacles = structuredClone(DEFAULT_OBSTACLES); }
  } else {
    obstacles = structuredClone(DEFAULT_OBSTACLES);
  }

  bgImg.onload = () => { resize(); draw(); };
  bgImg.src = BG_SRC;

  window.addEventListener("resize", () => { resize(); draw(); });
  resize();
  draw();
  updateList();
  updateExport();
}

// ====== Layout ======
function resize() {
  const rect = wrap.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeBgTransform(rect.width, rect.height);
}

function computeBgTransform(cw, ch) {
  if (!bgImg.naturalWidth) return;
  const imgAspect = bgImg.naturalWidth / bgImg.naturalHeight;
  const canAspect = cw / ch;
  let dw, dh;
  if (canAspect > imgAspect) {
    dw = cw * ZOOM;
    dh = dw / imgAspect;
  } else {
    dh = ch * ZOOM;
    dw = dh * imgAspect;
  }
  bgTransform = { x: (cw - dw) / 2, y: (ch - dh) / 2, w: dw, h: dh };
}

// ====== Coordinate helpers ======
function normToCanvas(o) {
  const bt = bgTransform;
  return {
    x: bt.x + o.nx * bt.w,
    y: bt.y + o.ny * bt.h,
    w: o.nw * bt.w,
    h: o.nh * bt.h,
  };
}

function canvasToNorm(x, y, w, h) {
  const bt = bgTransform;
  return {
    nx: round4((x - bt.x) / bt.w),
    ny: round4((y - bt.y) / bt.h),
    nw: round4(w / bt.w),
    nh: round4(h / bt.h),
  };
}

function round4(v) { return Math.round(v * 10000) / 10000; }

// ====== Drawing ======
function draw() {
  const rect = wrap.getBoundingClientRect();
  const cw = rect.width;
  const ch = rect.height;
  ctx.clearRect(0, 0, cw, ch);

  // Background image
  if (bgImg.naturalWidth) {
    ctx.drawImage(bgImg, bgTransform.x, bgTransform.y, bgTransform.w, bgTransform.h);
    // Slight dim for contrast
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0, 0, cw, ch);
  }

  // Draw all obstacles
  for (let i = 0; i < obstacles.length; i++) {
    const sel = i === selectedIdx;
    const r = normToCanvas(obstacles[i]);
    drawObstacle(r, obstacles[i].label, sel, i);
  }
}

function drawObstacle(r, label, selected, idx) {
  // Fill
  ctx.fillStyle = selected ? "rgba(0,255,80,0.18)" : "rgba(255,50,50,0.12)";
  ctx.fillRect(r.x, r.y, r.w, r.h);

  // Border
  ctx.strokeStyle = selected ? "#4f4" : "rgba(255,80,80,0.7)";
  ctx.lineWidth = selected ? 2 : 1.5;
  ctx.setLineDash(selected ? [] : [6, 4]);
  ctx.strokeRect(r.x, r.y, r.w, r.h);
  ctx.setLineDash([]);

  // Label
  ctx.font = "bold 11px Consolas, monospace";
  ctx.fillStyle = selected ? "#8f8" : "rgba(255,130,130,0.9)";
  ctx.fillText(`${idx}: ${label || "unnamed"}`, r.x + 4, r.y + 13);

  // Resize handles (when selected)
  if (selected) {
    const hs = HANDLE_SIZE;
    const handles = getHandlePositions(r);
    for (const h of Object.values(handles)) {
      ctx.fillStyle = "#4f4";
      ctx.fillRect(h.x - hs / 2, h.y - hs / 2, hs, hs);
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;
      ctx.strokeRect(h.x - hs / 2, h.y - hs / 2, hs, hs);
    }
  }
}

function getHandlePositions(r) {
  const cx = r.x + r.w / 2;
  const cy = r.y + r.h / 2;
  return {
    nw: { x: r.x, y: r.y },
    n:  { x: cx, y: r.y },
    ne: { x: r.x + r.w, y: r.y },
    w:  { x: r.x, y: cy },
    e:  { x: r.x + r.w, y: cy },
    sw: { x: r.x, y: r.y + r.h },
    s:  { x: cx, y: r.y + r.h },
    se: { x: r.x + r.w, y: r.y + r.h },
  };
}

// ====== Hit testing ======
function hitTest(mx, my) {
  // Check handles of selected first
  if (selectedIdx >= 0) {
    const r = normToCanvas(obstacles[selectedIdx]);
    const handles = getHandlePositions(r);
    for (const [dir, h] of Object.entries(handles)) {
      if (Math.abs(mx - h.x) < HANDLE_SIZE && Math.abs(my - h.y) < HANDLE_SIZE) {
        return { type: "handle", idx: selectedIdx, dir };
      }
    }
  }

  // Check edges of selected (for resize from edge)
  if (selectedIdx >= 0) {
    const r = normToCanvas(obstacles[selectedIdx]);
    const edgeDist = 6;
    if (mx >= r.x - edgeDist && mx <= r.x + r.w + edgeDist &&
        my >= r.y - edgeDist && my <= r.y + r.h + edgeDist) {
      const nearL = Math.abs(mx - r.x) < edgeDist;
      const nearR = Math.abs(mx - (r.x + r.w)) < edgeDist;
      const nearT = Math.abs(my - r.y) < edgeDist;
      const nearB = Math.abs(my - (r.y + r.h)) < edgeDist;
      if (nearT && nearL) return { type: "handle", idx: selectedIdx, dir: "nw" };
      if (nearT && nearR) return { type: "handle", idx: selectedIdx, dir: "ne" };
      if (nearB && nearL) return { type: "handle", idx: selectedIdx, dir: "sw" };
      if (nearB && nearR) return { type: "handle", idx: selectedIdx, dir: "se" };
      if (nearL && my > r.y && my < r.y + r.h) return { type: "handle", idx: selectedIdx, dir: "w" };
      if (nearR && my > r.y && my < r.y + r.h) return { type: "handle", idx: selectedIdx, dir: "e" };
      if (nearT && mx > r.x && mx < r.x + r.w) return { type: "handle", idx: selectedIdx, dir: "n" };
      if (nearB && mx > r.x && mx < r.x + r.w) return { type: "handle", idx: selectedIdx, dir: "s" };
    }
  }

  // Check body clicks (reverse to prefer top/last)
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const r = normToCanvas(obstacles[i]);
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
      return { type: "body", idx: i };
    }
  }

  return null;
}

// ====== Cursor ======
function getCursor(hit) {
  if (!hit) return "default";
  if (hit.type === "body") return "move";
  const d = hit.dir;
  if (d === "n" || d === "s") return "ns-resize";
  if (d === "e" || d === "w") return "ew-resize";
  if (d === "nw" || d === "se") return "nwse-resize";
  if (d === "ne" || d === "sw") return "nesw-resize";
  return "default";
}

// ====== Mouse events ======
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener("mousedown", (e) => {
  const { x, y } = getMousePos(e);
  const hit = hitTest(x, y);

  if (!hit) {
    selectedIdx = -1;
    draw();
    updateList();
    updateProps();
    return;
  }

  selectedIdx = hit.idx;

  const o = obstacles[selectedIdx];
  const r = normToCanvas(o);

  if (hit.type === "body") {
    dragMode = "move";
    dragStart = { mx: x, my: y, ox: r.x, oy: r.y, ow: r.w, oh: r.h };
  } else {
    dragMode = hit.dir;
    dragStart = { mx: x, my: y, ox: r.x, oy: r.y, ow: r.w, oh: r.h };
  }

  draw();
  updateList();
  updateProps();
});

canvas.addEventListener("mousemove", (e) => {
  const { x, y } = getMousePos(e);

  if (dragMode && dragStart && selectedIdx >= 0) {
    const dx = x - dragStart.mx;
    const dy = y - dragStart.my;
    let nx = dragStart.ox;
    let ny = dragStart.oy;
    let nw = dragStart.ow;
    let nh = dragStart.oh;

    if (dragMode === "move") {
      nx += dx;
      ny += dy;
    } else {
      // Resize
      if (dragMode.includes("w")) { nx += dx; nw -= dx; }
      if (dragMode.includes("e")) { nw += dx; }
      if (dragMode.includes("n")) { ny += dy; nh -= dy; }
      if (dragMode.includes("s")) { nh += dy; }

      // Minimum size
      if (nw < 10) { nw = 10; }
      if (nh < 10) { nh = 10; }
    }

    const norm = canvasToNorm(nx, ny, nw, nh);
    obstacles[selectedIdx].nx = norm.nx;
    obstacles[selectedIdx].ny = norm.ny;
    obstacles[selectedIdx].nw = norm.nw;
    obstacles[selectedIdx].nh = norm.nh;

    draw();
    updateProps();
    updateExport();
    save();
    return;
  }

  // Update cursor
  const hit = hitTest(x, y);
  canvas.style.cursor = getCursor(hit);
});

canvas.addEventListener("mouseup", () => {
  if (dragMode) {
    dragMode = null;
    dragStart = null;
    updateList();
    updateExport();
    save();
  }
});

canvas.addEventListener("mouseleave", () => {
  if (dragMode) {
    dragMode = null;
    dragStart = null;
  }
});

// ====== Keyboard ======
document.addEventListener("keydown", (e) => {
  // Don't intercept when typing in inputs
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

  if (e.key === "Delete" && selectedIdx >= 0) {
    deleteSelected();
  }
  if (e.ctrlKey && e.key === "d") {
    e.preventDefault();
    duplicateSelected();
  }
  if (e.ctrlKey && e.key === "a") {
    e.preventDefault();
    addObstacle();
  }
});

// ====== Actions ======
function addObstacle() {
  obstacles.push({ nx: 0.4, ny: 0.4, nw: 0.1, nh: 0.1, label: "New Obstacle" });
  selectedIdx = obstacles.length - 1;
  draw();
  updateList();
  updateProps();
  updateExport();
  save();
}

function duplicateSelected() {
  if (selectedIdx < 0) return;
  const src = obstacles[selectedIdx];
  obstacles.push({
    nx: round4(src.nx + 0.02),
    ny: round4(src.ny + 0.02),
    nw: src.nw,
    nh: src.nh,
    label: src.label + " copy",
  });
  selectedIdx = obstacles.length - 1;
  draw();
  updateList();
  updateProps();
  updateExport();
  save();
}

function deleteSelected() {
  if (selectedIdx < 0) return;
  obstacles.splice(selectedIdx, 1);
  selectedIdx = -1;
  draw();
  updateList();
  updateProps();
  updateExport();
  save();
}

function clearAll() {
  if (!confirm("Delete ALL obstacles?")) return;
  obstacles = [];
  selectedIdx = -1;
  draw();
  updateList();
  updateProps();
  updateExport();
  save();
}

// ====== Sidebar: obstacle list ======
function updateList() {
  const el = document.getElementById("obstacle-list");
  el.innerHTML = "";
  obstacles.forEach((o, i) => {
    const div = document.createElement("div");
    div.className = "obs-item" + (i === selectedIdx ? " selected" : "");
    div.innerHTML = `
      <div class="dot"></div>
      <div class="lbl">${i}: ${o.label || "unnamed"}</div>
      <div class="coords">${o.nx.toFixed(3)},${o.ny.toFixed(3)}</div>
    `;
    div.addEventListener("click", () => {
      selectedIdx = i;
      draw();
      updateList();
      updateProps();
    });
    el.appendChild(div);
  });
}

// ====== Sidebar: properties panel ======
function updateProps() {
  const el = document.getElementById("props-content");
  if (selectedIdx < 0) {
    el.innerHTML = '<div id="no-selection">Click an obstacle to select</div>';
    return;
  }
  const o = obstacles[selectedIdx];
  el.innerHTML = `
    <div class="row">
      <label>Label</label>
      <input type="text" id="prop-label" value="${escHtml(o.label || "")}" />
    </div>
    <div class="row">
      <label>nX</label>
      <input type="number" id="prop-nx" step="0.001" value="${o.nx}" />
      <label>nY</label>
      <input type="number" id="prop-ny" step="0.001" value="${o.ny}" />
    </div>
    <div class="row">
      <label>nW</label>
      <input type="number" id="prop-nw" step="0.001" value="${o.nw}" />
      <label>nH</label>
      <input type="number" id="prop-nh" step="0.001" value="${o.nh}" />
    </div>
  `;
  // Bind inputs
  const bind = (id, key, isNum) => {
    const inp = document.getElementById(id);
    inp.addEventListener("input", () => {
      obstacles[selectedIdx][key] = isNum ? parseFloat(inp.value) || 0 : inp.value;
      draw();
      updateList();
      updateExport();
      save();
    });
  };
  bind("prop-label", "label", false);
  bind("prop-nx", "nx", true);
  bind("prop-ny", "ny", true);
  bind("prop-nw", "nw", true);
  bind("prop-nh", "nh", true);
}

function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

// ====== Export ======
function updateExport() {
  const box = document.getElementById("export-box");
  const jsonArr = obstacles.map(o => {
    const entry = { nx: o.nx, ny: o.ny, nw: o.nw, nh: o.nh };
    entry.label = o.label || "";
    return entry;
  });
  box.value = JSON.stringify(jsonArr, null, 2) + "\n";
}

// ====== Import ======
function doImport() {
  const box = document.getElementById("export-box");
  const raw = box.value.trim();
  try {
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) throw new Error("Not an array");
    // Validate
    for (const o of arr) {
      if (typeof o.nx !== "number" || typeof o.ny !== "number" ||
          typeof o.nw !== "number" || typeof o.nh !== "number") {
        throw new Error("Missing nx/ny/nw/nh");
      }
      o.label = o.label || "imported";
    }
    obstacles = arr;
    selectedIdx = -1;
    draw();
    updateList();
    updateProps();
    updateExport();
    save();
    alert(`Imported ${arr.length} obstacles.`);
  } catch (err) {
    alert("Import failed: " + err.message + "\n\nPaste a valid JSON array.");
  }
}

// ====== Persistence ======
function save() {
  localStorage.setItem("dv_editor_obstacles", JSON.stringify(obstacles));
}

// ====== Button wiring ======
document.getElementById("btn-add").addEventListener("click", addObstacle);
document.getElementById("btn-dup").addEventListener("click", duplicateSelected);
document.getElementById("btn-del").addEventListener("click", deleteSelected);
document.getElementById("btn-clear").addEventListener("click", clearAll);

  const box = document.getElementById("export-box");
