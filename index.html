<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeadVector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" aria-label="DeadVector game arena"></canvas>

    <div id="brand-corner">
      <span class="brand-title">DEADV<span class="brand-accent">X</span>CTOR</span>
      <button id="mute-button" class="icon-btn" type="button" title="Toggle sound">&#9834;</button>
    </div>

    <section id="menu-screen" class="overlay visible">
      <div class="overlay-inner">
        <h1 class="menu-title">DEAD<span class="brand-accent">V</span>ECTOR</h1>
        <p class="menu-sub">Top-down zombie survival &mdash; FSM-driven AI</p>

        <div class="menu-stats-row">
          <div class="menu-stat"><span class="stat-val">3</span><span class="stat-lbl">Weapons</span></div>
          <div class="menu-stat"><span class="stat-val">5</span><span class="stat-lbl">Enemy Types</span></div>
          <div class="menu-stat"><span class="stat-val">6</span><span class="stat-lbl">AI States</span></div>
        </div>

        <div class="controls-grid">
          <kbd>WASD</kbd><span>Move</span>
          <kbd>Mouse</kbd><span>Aim</span>
          <kbd>LMB</kbd><span>Shoot</span>
          <kbd>RMB</kbd><span>Dash</span>
          <kbd>1 2 3</kbd><span>Weapon</span>
          <kbd>Esc</kbd><span>Pause</span>
        </div>

        <button id="play-button" class="btn-primary" type="button">START GAME</button>
        <p class="menu-hint">or press <kbd>R</kbd></p>
      </div>
    </section>

    <section id="pause-screen" class="overlay hidden">
      <div class="overlay-inner overlay-compact">
        <h2 class="overlay-title">PAUSED</h2>
        <p class="overlay-text">Game paused. Focus loss auto-pauses.</p>
        <button id="resume-button" class="btn-primary" type="button">RESUME</button>
      </div>
    </section>

    <section id="game-over-screen" class="overlay hidden">
      <div class="overlay-inner overlay-compact">
        <h2 class="overlay-title game-over-title">DEAD</h2>
        <p id="final-summary" class="overlay-text">Score: 0 &bull; Wave: 0 &bull; Kills: 0</p>
        <button id="restart-button" class="btn-primary" type="button">TRY AGAIN</button>
        <p class="menu-hint">or press <kbd>R</kbd></p>
      </div>
    </section>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
