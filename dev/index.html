<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadVector — Dev Panel</title>
<link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-0: #08090c; --bg-1: #0e1014; --bg-2: #14161c; --bg-3: #1a1d25; --bg-4: #22252f;
  --border: #2a2d38; --border-hi: #3a3e4d;
  --text-0: #eaedf6; --text-1: #b0b5c5; --text-2: #6e7385; --text-3: #454a5a;
  --accent: #ff3a3a; --accent-dim: #cc2020;
  --green: #00ff88; --green-dim: rgba(0,255,136,0.15);
  --cyan: #44d4ff;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', 'Consolas', monospace;
  --font-ui: 'Inter', 'Segoe UI', sans-serif;
  --radius: 8px; --radius-sm: 5px;
  --transition: 0.18s ease;
}
body { background: var(--bg-0); color: var(--text-1); font-family: var(--font-ui); height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ---- Nav ---- */
#topnav { height: 44px; min-height: 44px; background: var(--bg-1); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100; position: relative; }
#topnav::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent) 20%, var(--accent) 80%, transparent); opacity: 0.25; }
.nav-brand { display: flex; align-items: center; gap: 8px; }
.nav-brand .logo { font-family: var(--font-display); font-weight: 900; font-size: 14px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
.nav-brand .divider { width: 1px; height: 18px; background: var(--border); }
.nav-brand .subtitle { font-family: var(--font-mono); font-size: 10px; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
.nav-spacer { flex: 1; }
.nav-toggles { display: flex; gap: 3px; }
.nav-toggle { padding: 4px 10px; background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 10px; font-weight: 500; cursor: pointer; transition: all var(--transition); }
.nav-toggle:hover { color: var(--text-0); border-color: var(--border-hi); }
.nav-toggle.active { color: var(--green); border-color: rgba(0,255,136,0.3); }
.nav-status { display: flex; align-items: center; gap: 10px; font-size: 10px; font-family: var(--font-mono); color: var(--text-3); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.nav-back { padding: 4px 10px; background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-ui); font-size: 10px; cursor: pointer; transition: all var(--transition); text-decoration: none; }
.nav-back:hover { color: var(--text-0); border-color: var(--border-hi); background: var(--bg-4); }

/* ---- Main ---- */
#main { flex: 1; position: relative; overflow: hidden; background: var(--bg-0); }
#main canvas { position: absolute; top: 0; left: 0; }

/* ---- Floating Panels ---- */
.fp { position: absolute; z-index: 30; display: flex; flex-direction: column; background: rgba(10,12,16,0.88); backdrop-filter: blur(14px); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 6px 28px rgba(0,0,0,0.45); }
.fp.hidden { display: none !important; }
.fp-bar { display: flex; align-items: center; padding: 6px 10px; background: rgba(14,16,20,0.5); border-bottom: 1px solid var(--border); cursor: grab; gap: 6px; flex-shrink: 0; }
.fp-bar:active { cursor: grabbing; }
.fp-bar .fp-icon { font-size: 11px; color: var(--accent); }
.fp-bar .fp-title { flex: 1; font-family: var(--font-display); font-size: 9px; font-weight: 700; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
.fp-bar .fp-count { background: var(--bg-4); color: var(--text-2); padding: 1px 6px; border-radius: 8px; font-size: 9px; font-family: var(--font-mono); }
.fp-close { width: 18px; height: 18px; border: none; background: var(--bg-4); color: var(--text-3); border-radius: 3px; cursor: pointer; font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.fp-close:hover { background: var(--accent); color: #fff; }
.fp-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.fp-grip { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; z-index: 2; }
.fp-grip::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 7px; height: 7px; border-right: 2px solid var(--border-hi); border-bottom: 2px solid var(--border-hi); opacity: 0.6; }

/* ---- Panel content ---- */
.fp-toolbar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.btn { padding: 4px 10px; background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-ui); font-size: 10px; font-weight: 500; transition: all var(--transition); white-space: nowrap; }
.btn:hover { background: var(--bg-4); border-color: var(--border-hi); color: var(--text-0); }
.btn:active { transform: scale(0.96); }
.btn.primary { color: var(--green); border-color: rgba(0,255,136,0.25); }
.btn.primary:hover { background: var(--green-dim); border-color: rgba(0,255,136,0.4); }
.btn.danger { color: #ff6b6b; border-color: rgba(255,60,60,0.2); }
.btn.danger:hover { background: rgba(255,60,60,0.08); border-color: rgba(255,60,60,0.35); }

.obs-item { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.1s; }
.obs-item:hover { background: var(--bg-2); }
.obs-item.selected { background: rgba(0,255,136,0.05); border-left-color: var(--green); }
.obs-item .dot { width: 7px; height: 7px; border-radius: 2px; background: var(--accent); flex-shrink: 0; }
.obs-item.selected .dot { background: var(--green); box-shadow: 0 0 3px var(--green); }
.obs-item .lbl { flex: 1; font-size: 11px; color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.obs-item.selected .lbl { color: var(--text-0); }
.obs-item .coords { font-size: 9px; font-family: var(--font-mono); color: var(--text-3); }

.props-inner { padding: 10px 10px 8px; }
.props-inner .section-title { font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
.props-inner .row { display: flex; gap: 6px; margin-bottom: 5px; align-items: center; }
.props-inner label { font-size: 9px; font-family: var(--font-mono); color: var(--text-3); width: 22px; text-align: right; flex-shrink: 0; text-transform: uppercase; }
.props-inner input[type="number"], .props-inner input[type="text"] { flex: 1; background: var(--bg-0); border: 1px solid var(--border); color: var(--text-0); padding: 4px 6px; border-radius: var(--radius-sm); font-size: 11px; font-family: var(--font-mono); transition: border-color var(--transition); min-width: 0; }
.props-inner input:focus { outline: none; border-color: var(--green); }
#no-selection { color: var(--text-3); font-size: 11px; font-style: italic; text-align: center; padding: 12px 0; }

.export-inner { padding: 10px; display: flex; flex-direction: column; gap: 8px; height: 100%; }
#export-box { flex: 1; min-height: 60px; background: var(--bg-0); color: var(--green); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; font-size: 9px; font-family: var(--font-mono); resize: none; line-height: 1.5; }
#export-box:focus { outline: none; border-color: var(--green); }
.export-inner .actions { display: flex; gap: 4px; }
.export-inner .actions .btn { flex: 1; text-align: center; }

/* ---- Status bar ---- */
#statusbar { position: absolute; bottom: 0; left: 0; right: 0; height: 24px; background: var(--bg-1); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 14px; font-size: 9px; font-family: var(--font-mono); color: var(--text-3); z-index: 10; }
#statusbar .sep { width: 1px; height: 10px; background: var(--border); }

/* ---- Help ---- */
#helpbar { position: absolute; top: 10px; right: 10px; background: rgba(10,12,16,0.82); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; z-index: 15; pointer-events: none; transition: opacity 0.2s; }
#helpbar.hidden { opacity: 0; pointer-events: none; }
.help-title { font-size: 8px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
.help-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; font-size: 10px; color: var(--text-2); }
.help-row kbd { display: inline-block; background: var(--bg-4); border: 1px solid var(--border); border-radius: 3px; padding: 0 5px; font-family: var(--font-mono); font-size: 8px; color: var(--text-1); min-width: 18px; text-align: center; }

/* ---- Toast ---- */
.toast { position: fixed; top: 54px; left: 50%; transform: translateX(-50%) translateY(-6px); background: var(--bg-3); color: var(--green); border: 1px solid rgba(0,255,136,0.2); border-radius: var(--radius); padding: 6px 18px; font-family: var(--font-mono); font-size: 11px; z-index: 200; opacity: 0; transition: all 0.3s ease; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---- Scanline + crosshair ---- */
#main::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px); pointer-events: none; z-index: 5; }
#crosshair-h, #crosshair-v { position: absolute; background: rgba(0,255,136,0.07); pointer-events: none; z-index: 4; display: none; }
#crosshair-h { height: 1px; left: 0; right: 0; }
#crosshair-v { width: 1px; top: 0; bottom: 0; }
</style>
</head>
<body>

<nav id="topnav">
  <div class="nav-brand">
    <span class="logo">DeadVector</span>
    <span class="divider"></span>
    <span class="subtitle">Dev Panel</span>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-toggles">
    <button class="nav-toggle active" data-panel="fp-obstacles" title="Obstacles (1)">Obstacles</button>
    <button class="nav-toggle active" data-panel="fp-props" title="Properties (2)">Properties</button>
    <button class="nav-toggle active" data-panel="fp-export" title="Export (3)">Export</button>
    <button class="nav-toggle" id="btn-toggle-help" title="Help (H)">Help</button>
  </div>
  <div class="nav-status">
    <div class="status-dot"></div>
    <span id="nav-count">11</span>
  </div>
  <a class="nav-back" href="../index.html">&larr; Game</a>
</nav>

<div id="main">
  <canvas id="canvas"></canvas>
  <div id="crosshair-h"></div>
  <div id="crosshair-v"></div>

  <!-- Floating Panel: Obstacles -->
  <div class="fp" id="fp-obstacles">
    <div class="fp-bar" data-drag="fp-obstacles">
      <span class="fp-icon">&#9638;</span>
      <span class="fp-title">Obstacles</span>
      <span class="fp-count" id="panel-count">0</span>
      <button class="fp-close" data-close="fp-obstacles">&times;</button>
    </div>
    <div class="fp-toolbar">
      <button class="btn primary" id="btn-add">+ Add</button>
      <button class="btn" id="btn-dup">Dup</button>
      <button class="btn danger" id="btn-del">Del</button>
      <button class="btn danger" id="btn-clear">Clear</button>
      <button class="btn" id="btn-reset">Reset</button>
    </div>
    <div class="fp-body" id="obstacle-list"></div>
    <div class="fp-grip" data-resize="fp-obstacles"></div>
  </div>

  <!-- Floating Panel: Properties -->
  <div class="fp" id="fp-props">
    <div class="fp-bar" data-drag="fp-props">
      <span class="fp-icon">&#9881;</span>
      <span class="fp-title">Properties</span>
      <button class="fp-close" data-close="fp-props">&times;</button>
    </div>
    <div class="fp-body">
      <div class="props-inner" id="props-content">
        <div id="no-selection">Select an obstacle</div>
      </div>
    </div>
    <div class="fp-grip" data-resize="fp-props"></div>
  </div>

  <!-- Floating Panel: Export -->
  <div class="fp" id="fp-export">
    <div class="fp-bar" data-drag="fp-export">
      <span class="fp-icon">&#8680;</span>
      <span class="fp-title">Export / Import</span>
      <button class="fp-close" data-close="fp-export">&times;</button>
    </div>
    <div class="fp-body">
      <div class="export-inner">
        <textarea id="export-box" spellcheck="false" placeholder="Obstacle data..."></textarea>
        <div class="actions">
          <button class="btn primary" id="btn-copy">Copy</button>
          <button class="btn" id="btn-import">Import</button>
        </div>
      </div>
    </div>
    <div class="fp-grip" data-resize="fp-export"></div>
  </div>

  <div id="helpbar">
    <div class="help-title">Controls</div>
    <div class="help-row"><kbd>Click</kbd> Select</div>
    <div class="help-row"><kbd>Drag</kbd> Move</div>
    <div class="help-row"><kbd>Edges</kbd> Resize</div>
    <div class="help-row"><kbd>&#9670;</kbd> Drag corner &#9670; to round</div>
    <div class="help-row"><kbd>Del</kbd> Delete</div>
    <div class="help-row"><kbd>Ctrl D</kbd> Duplicate</div>
    <div class="help-row"><kbd>Ctrl A</kbd> Add New</div>
    <div class="help-row"><kbd>1 2 3</kbd> Toggle panels</div>
    <div class="help-row"><kbd>H</kbd> Toggle help</div>
  </div>

  <div id="statusbar">
    <span id="status-mouse">X: 0  Y: 0</span>
    <div class="sep"></div>
    <span id="status-norm">nX: 0  nY: 0</span>
    <div class="sep"></div>
    <span id="status-sel">No selection</span>
    <div class="sep"></div>
    <span id="status-zoom">Zoom: 1.12x</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===========================================================================
//  DeadVector  —  Map Obstacle Editor
// ===========================================================================

const BG_SRC = "../assets/images/background.png";
const HANDLE = 7;
const ZOOM = 1.12;
const RAD_HANDLE = 5;
const MIN_PW = 180;
const MIN_PH = 90;

// ---- State ----
let obstacles = [];
let selectedIdx = -1;
let bgImg = new Image();
let bgT = { x: 0, y: 0, w: 0, h: 0 };
let dragMode = null;
let dragStart = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const mainEl = document.getElementById("main");
const crossH = document.getElementById("crosshair-h");
const crossV = document.getElementById("crosshair-v");

const DEFAULT_OBSTACLES = [
  { nx: 0.275, ny: -0.01, nw: 0.445, nh: 0.225, nr: 0, label: "Top Building" },
  { nx: 0.245, ny: 0.79, nw: 0.48, nh: 0.22, nr: 0, label: "Bottom Building" },
  { nx: -0.01, ny: -0.01, nw: 0.13, nh: 0.225, nr: 0, label: "TL Corner" },
  { nx: 0.875, ny: -0.01, nw: 0.135, nh: 0.225, nr: 0, label: "TR Corner" },
  { nx: -0.01, ny: 0.79, nw: 0.10, nh: 0.22, nr: 0, label: "BL Corner" },
  { nx: 0.91, ny: 0.79, nw: 0.10, nh: 0.22, nr: 0, label: "BR Corner" },
  { nx: 0.175, ny: 0.02, nw: 0.07, nh: 0.07, nr: 0, label: "Car TL" },
  { nx: -0.005, ny: 0.30, nw: 0.05, nh: 0.12, nr: 0, label: "Car L1" },
  { nx: -0.005, ny: 0.57, nw: 0.055, nh: 0.12, nr: 0, label: "Car L2" },
  { nx: 0.075, ny: 0.845, nw: 0.06, nh: 0.06, nr: 0, label: "Car BL" },
  { nx: 0.815, ny: 0.86, nw: 0.065, nh: 0.06, nr: 0, label: "Car BR" },
];

// ===========================================================================
//  Toast
// ===========================================================================
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
}

// ===========================================================================
//  Floating Panel System
// ===========================================================================
const PANEL_IDS = ["fp-obstacles", "fp-props", "fp-export"];
const PANEL_DEFAULTS = {
  "fp-obstacles": { x: 12, y: 12, w: 270, h: 380 },
  "fp-props":     { x: 12, y: 404, w: 270, h: 220 },
  "fp-export":    { x: 12, y: 636, w: 270, h: 240 },
};
let panelZ = 30;
let fpDrag = null;

function loadPanels() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem("dv_panel_layout") || "{}"); } catch {}
  for (const id of PANEL_IDS) {
    const def = PANEL_DEFAULTS[id];
    const s = saved[id] || {};
    const el = document.getElementById(id);
    el.style.left   = (s.x ?? def.x) + "px";
    el.style.top    = (s.y ?? def.y) + "px";
    el.style.width  = (s.w ?? def.w) + "px";
    el.style.height = (s.h ?? def.h) + "px";
    if (s.hidden) el.classList.add("hidden");
    syncToggle(id);
  }
}

function savePanels() {
  const out = {};
  for (const id of PANEL_IDS) {
    const el = document.getElementById(id);
    out[id] = {
      x: parseInt(el.style.left) || 0,
      y: parseInt(el.style.top) || 0,
      w: parseInt(el.style.width) || 200,
      h: parseInt(el.style.height) || 150,
      hidden: el.classList.contains("hidden"),
    };
  }
  localStorage.setItem("dv_panel_layout", JSON.stringify(out));
}

function bringFront(id) {
  panelZ++;
  document.getElementById(id).style.zIndex = panelZ;
}

function togglePanel(id) {
  const el = document.getElementById(id);
  el.classList.toggle("hidden");
  if (!el.classList.contains("hidden")) bringFront(id);
  syncToggle(id);
  savePanels();
}

function syncToggle(id) {
  const btn = document.querySelector(`.nav-toggle[data-panel="${id}"]`);
  if (!btn) return;
  btn.classList.toggle("active", !document.getElementById(id).classList.contains("hidden"));
}

// Panel drag / resize
document.addEventListener("mousedown", (e) => {
  const dragBar = e.target.closest("[data-drag]");
  if (dragBar) { startFpDrag(e, dragBar.dataset.drag, "move"); return; }
  const grip = e.target.closest("[data-resize]");
  if (grip) { startFpDrag(e, grip.dataset.resize, "resize"); return; }
  const closeBtn = e.target.closest("[data-close]");
  if (closeBtn) { togglePanel(closeBtn.dataset.close); return; }
  const fp = e.target.closest(".fp");
  if (fp && PANEL_IDS.includes(fp.id)) bringFront(fp.id);
});

function startFpDrag(e, id, mode) {
  e.preventDefault();
  bringFront(id);
  const el = document.getElementById(id);
  const rect = el.getBoundingClientRect();
  const vpRect = mainEl.getBoundingClientRect();
  fpDrag = {
    id, mode,
    mx0: e.clientX, my0: e.clientY,
    x0: rect.left - vpRect.left, y0: rect.top - vpRect.top,
    w0: rect.width, h0: rect.height,
  };
}

document.addEventListener("mousemove", (e) => {
  if (!fpDrag) return;
  const dx = e.clientX - fpDrag.mx0, dy = e.clientY - fpDrag.my0;
  const el = document.getElementById(fpDrag.id);
  if (fpDrag.mode === "move") {
    el.style.left = (fpDrag.x0 + dx) + "px";
    el.style.top  = (fpDrag.y0 + dy) + "px";
  } else {
    el.style.width  = Math.max(MIN_PW, fpDrag.w0 + dx) + "px";
    el.style.height = Math.max(MIN_PH, fpDrag.h0 + dy) + "px";
  }
});

document.addEventListener("mouseup", () => {
  if (fpDrag) { fpDrag = null; savePanels(); }
});

document.querySelectorAll(".nav-toggle[data-panel]").forEach(btn => {
  btn.addEventListener("click", () => togglePanel(btn.dataset.panel));
});

let helpVisible = true;
document.getElementById("btn-toggle-help").addEventListener("click", toggleHelp);
function toggleHelp() {
  helpVisible = !helpVisible;
  document.getElementById("helpbar").classList.toggle("hidden", !helpVisible);
  document.getElementById("btn-toggle-help").classList.toggle("active", helpVisible);
}

// ===========================================================================
//  Init
// ===========================================================================
function init() {
  loadPanels();
  const saved = localStorage.getItem("dv_editor_obstacles");
  if (saved) {
    try { obstacles = JSON.parse(saved); } catch { obstacles = structuredClone(DEFAULT_OBSTACLES); }
  } else {
    obstacles = structuredClone(DEFAULT_OBSTACLES);
  }
  for (const o of obstacles) { if (typeof o.nr !== "number") o.nr = 0; }

  bgImg.onload = () => { resizeCanvas(); draw(); };
  bgImg.src = BG_SRC;
  window.addEventListener("resize", () => { resizeCanvas(); draw(); });
  resizeCanvas(); draw(); updateList(); updateExport(); syncCounts();
}

// ===========================================================================
//  Canvas Layout
// ===========================================================================
function resizeCanvas() {
  const rect = mainEl.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const h = rect.height - 24;
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = rect.width + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeBg(rect.width, h);
}

function computeBg(cw, ch) {
  if (!bgImg.naturalWidth) return;
  const ia = bgImg.naturalWidth / bgImg.naturalHeight, ca = cw / ch;
  let dw, dh;
  if (ca > ia) { dw = cw * ZOOM; dh = dw / ia; } else { dh = ch * ZOOM; dw = dh * ia; }
  bgT = { x: (cw - dw) / 2, y: (ch - dh) / 2, w: dw, h: dh };
}

// ===========================================================================
//  Coord Helpers
// ===========================================================================
function n2c(o) {
  const w = o.nw * bgT.w, h = o.nh * bgT.h;
  return { x: bgT.x + o.nx * bgT.w, y: bgT.y + o.ny * bgT.h, w, h, r: (o.nr || 0) * Math.min(w, h) };
}
function c2n(x, y, w, h) {
  return { nx: r4((x - bgT.x) / bgT.w), ny: r4((y - bgT.y) / bgT.h), nw: r4(w / bgT.w), nh: r4(h / bgT.h) };
}
function r4(v) { return Math.round(v * 10000) / 10000; }

// ===========================================================================
//  Drawing
// ===========================================================================
function draw() {
  const rect = mainEl.getBoundingClientRect();
  const cw = rect.width, ch = rect.height - 24;
  ctx.clearRect(0, 0, cw, ch);

  if (bgImg.naturalWidth) {
    ctx.drawImage(bgImg, bgT.x, bgT.y, bgT.w, bgT.h);
    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.fillRect(0, 0, cw, ch);
  } else {
    ctx.fillStyle = "#0a0a0e"; ctx.fillRect(0, 0, cw, ch);
    ctx.fillStyle = "#333"; ctx.font = "13px Inter,sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Loading background…", cw / 2, ch / 2); ctx.textAlign = "start";
  }

  ctx.strokeStyle = "rgba(0,255,136,0.035)"; ctx.lineWidth = 0.5;
  const gs = 60;
  for (let x = bgT.x % gs; x < cw; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
  for (let y = bgT.y % gs; y < ch; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }

  for (let i = 0; i < obstacles.length; i++) drawObs(n2c(obstacles[i]), obstacles[i].label, i === selectedIdx, i);
}

function rrPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  if (r < 0.5) { ctx.beginPath(); ctx.rect(x, y, w, h); return; }
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);   ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);   ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);       ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawObs(c, label, sel, idx) {
  ctx.fillStyle = sel ? "rgba(0,255,136,0.12)" : "rgba(255,58,58,0.07)";
  rrPath(ctx, c.x, c.y, c.w, c.h, c.r); ctx.fill();

  ctx.strokeStyle = sel ? "rgba(0,255,136,0.9)" : "rgba(255,58,58,0.45)";
  ctx.lineWidth = sel ? 2 : 1;
  ctx.setLineDash(sel ? [] : [5, 4]);
  rrPath(ctx, c.x, c.y, c.w, c.h, c.r); ctx.stroke();
  ctx.setLineDash([]);

  if (sel) {
    ctx.save();
    rrPath(ctx, c.x, c.y, c.w, c.h, c.r); ctx.clip();
    ctx.strokeStyle = "rgba(0,255,136,0.05)"; ctx.lineWidth = 1;
    for (let d = -Math.max(c.w, c.h); d < Math.max(c.w, c.h) * 2; d += 12) {
      ctx.beginPath(); ctx.moveTo(c.x + d, c.y); ctx.lineTo(c.x + d - c.h, c.y + c.h); ctx.stroke();
    }
    ctx.restore();
  }

  // Label badge
  const lt = `${idx}: ${label || "unnamed"}`;
  ctx.font = "bold 9px 'Share Tech Mono',monospace";
  const tw = ctx.measureText(lt).width;
  const bh = 14, by = c.y - bh - 2;
  const bgC = sel ? "rgba(0,255,136,0.85)" : "rgba(255,58,58,0.7)";
  const txC = sel ? "#000" : "#fff";
  if (by > 0) {
    ctx.fillStyle = bgC; rrPath(ctx, c.x, by, tw + 8, bh, 3); ctx.fill();
    ctx.fillStyle = txC; ctx.fillText(lt, c.x + 4, by + 10);
  } else {
    ctx.fillStyle = bgC; rrPath(ctx, c.x + 2, c.y + 2, tw + 8, bh, 3); ctx.fill();
    ctx.fillStyle = txC; ctx.fillText(lt, c.x + 6, c.y + 12);
  }

  if (!sel) return;

  // Resize handles (green circles)
  for (const h of Object.values(getHandles(c))) {
    ctx.fillStyle = "rgba(0,255,136,0.18)";
    ctx.beginPath(); ctx.arc(h.x, h.y, HANDLE + 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#111";
    ctx.beginPath(); ctx.arc(h.x, h.y, HANDLE - 1, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(0,255,136,0.85)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(h.x, h.y, HANDLE - 1, 0, Math.PI * 2); ctx.stroke();
  }

  // Radius handles (cyan diamonds)
  for (const p of getRadiusHandles(c)) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.PI / 4);
    ctx.fillStyle = "rgba(68,212,255,0.18)";
    ctx.fillRect(-(RAD_HANDLE + 1), -(RAD_HANDLE + 1), (RAD_HANDLE + 1) * 2, (RAD_HANDLE + 1) * 2);
    ctx.fillStyle = "#0c1015";
    ctx.fillRect(-(RAD_HANDLE - 1), -(RAD_HANDLE - 1), (RAD_HANDLE - 1) * 2, (RAD_HANDLE - 1) * 2);
    ctx.strokeStyle = "rgba(68,212,255,0.9)"; ctx.lineWidth = 1.5;
    ctx.strokeRect(-(RAD_HANDLE - 1), -(RAD_HANDLE - 1), (RAD_HANDLE - 1) * 2, (RAD_HANDLE - 1) * 2);
    ctx.restore();
  }

  // Dimension text
  const dt = `${Math.round(c.w)}×${Math.round(c.h)}` + (c.r > 0.5 ? `  r:${Math.round(c.r)}` : "");
  ctx.font = "8px 'Share Tech Mono',monospace";
  ctx.fillStyle = "rgba(0,255,136,0.45)";
  ctx.fillText(dt, c.x + c.w / 2 - ctx.measureText(dt).width / 2, c.y + c.h + 12);
}

// ===========================================================================
//  Handles
// ===========================================================================
function getHandles(c) {
  const cx = c.x + c.w / 2, cy = c.y + c.h / 2;
  return {
    nw: { x: c.x, y: c.y }, n: { x: cx, y: c.y }, ne: { x: c.x + c.w, y: c.y },
    w: { x: c.x, y: cy },                           e: { x: c.x + c.w, y: cy },
    sw: { x: c.x, y: c.y + c.h }, s: { x: cx, y: c.y + c.h }, se: { x: c.x + c.w, y: c.y + c.h },
  };
}

function getRadiusHandles(c) {
  const r = c.r;
  return [
    { x: c.x + r, y: c.y + r },
    { x: c.x + c.w - r, y: c.y + r },
    { x: c.x + r, y: c.y + c.h - r },
    { x: c.x + c.w - r, y: c.y + c.h - r },
  ];
}

// ===========================================================================
//  Hit Testing
// ===========================================================================
function hitTest(mx, my) {
  if (selectedIdx >= 0) {
    const c = n2c(obstacles[selectedIdx]);

    // Radius handles (check first — they sit inside corners)
    const rh = getRadiusHandles(c);
    for (let i = 0; i < rh.length; i++) {
      if (Math.abs(mx - rh[i].x) < RAD_HANDLE + 3 && Math.abs(my - rh[i].y) < RAD_HANDLE + 3)
        return { type: "radius", idx: selectedIdx, corner: i };
    }

    // Resize handles
    const hs = getHandles(c);
    for (const [dir, h] of Object.entries(hs)) {
      if (Math.abs(mx - h.x) < HANDLE + 2 && Math.abs(my - h.y) < HANDLE + 2)
        return { type: "handle", idx: selectedIdx, dir };
    }

    // Edge proximity
    const ed = 6;
    if (mx >= c.x - ed && mx <= c.x + c.w + ed && my >= c.y - ed && my <= c.y + c.h + ed) {
      const nL = Math.abs(mx - c.x) < ed, nR = Math.abs(mx - (c.x + c.w)) < ed;
      const nT = Math.abs(my - c.y) < ed, nB = Math.abs(my - (c.y + c.h)) < ed;
      if (nT && nL) return { type: "handle", idx: selectedIdx, dir: "nw" };
      if (nT && nR) return { type: "handle", idx: selectedIdx, dir: "ne" };
      if (nB && nL) return { type: "handle", idx: selectedIdx, dir: "sw" };
      if (nB && nR) return { type: "handle", idx: selectedIdx, dir: "se" };
      if (nL && my > c.y && my < c.y + c.h) return { type: "handle", idx: selectedIdx, dir: "w" };
      if (nR && my > c.y && my < c.y + c.h) return { type: "handle", idx: selectedIdx, dir: "e" };
      if (nT && mx > c.x && mx < c.x + c.w) return { type: "handle", idx: selectedIdx, dir: "n" };
      if (nB && mx > c.x && mx < c.x + c.w) return { type: "handle", idx: selectedIdx, dir: "s" };
    }
  }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const c = n2c(obstacles[i]);
    if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h)
      return { type: "body", idx: i };
  }
  return null;
}

function getCursor(hit) {
  if (!hit) return "crosshair";
  if (hit.type === "body") return "move";
  if (hit.type === "radius") return "pointer";
  const d = hit.dir;
  if (d === "n" || d === "s") return "ns-resize";
  if (d === "e" || d === "w") return "ew-resize";
  if (d === "nw" || d === "se") return "nwse-resize";
  if (d === "ne" || d === "sw") return "nesw-resize";
  return "crosshair";
}

// ===========================================================================
//  Mouse Events (Canvas)
// ===========================================================================
function getMouse(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

canvas.addEventListener("mousedown", (e) => {
  if (fpDrag) return;
  const { x, y } = getMouse(e);
  const hit = hitTest(x, y);
  if (!hit) { selectedIdx = -1; draw(); updateList(); updateProps(); return; }
  selectedIdx = hit.idx;
  const c = n2c(obstacles[selectedIdx]);

  if (hit.type === "radius") {
    dragMode = "radius";
    dragStart = { corner: hit.corner, cx: c.x, cy: c.y, cw: c.w, ch: c.h };
  } else {
    dragMode = hit.type === "body" ? "move" : hit.dir;
    dragStart = { mx: x, my: y, ox: c.x, oy: c.y, ow: c.w, oh: c.h };
  }
  draw(); updateList(); updateProps();
});

canvas.addEventListener("mousemove", (e) => {
  if (fpDrag) return;
  const { x, y } = getMouse(e);
  crossH.style.display = "block"; crossH.style.top = y + "px";
  crossV.style.display = "block"; crossV.style.left = x + "px";
  document.getElementById("status-mouse").textContent = `X: ${Math.round(x)}  Y: ${Math.round(y)}`;
  if (bgT.w > 0) document.getElementById("status-norm").textContent = `nX: ${r4((x - bgT.x) / bgT.w)}  nY: ${r4((y - bgT.y) / bgT.h)}`;

  if (dragMode && dragStart && selectedIdx >= 0) {
    const o = obstacles[selectedIdx];
    if (dragMode === "radius") {
      const ds = dragStart;
      const corners = [
        { cx: ds.cx, cy: ds.cy },
        { cx: ds.cx + ds.cw, cy: ds.cy },
        { cx: ds.cx, cy: ds.cy + ds.ch },
        { cx: ds.cx + ds.cw, cy: ds.cy + ds.ch },
      ];
      const cn = corners[ds.corner];
      const dist = Math.min(Math.abs(x - cn.cx), Math.abs(y - cn.cy));
      const maxR = Math.min(ds.cw, ds.ch) / 2;
      o.nr = r4(Math.max(0, Math.min(dist, maxR)) / Math.min(ds.cw, ds.ch));
    } else {
      const dx = x - dragStart.mx, dy = y - dragStart.my;
      let rx = dragStart.ox, ry = dragStart.oy, rw = dragStart.ow, rh = dragStart.oh;
      if (dragMode === "move") { rx += dx; ry += dy; }
      else {
        if (dragMode.includes("w")) { rx += dx; rw -= dx; }
        if (dragMode.includes("e")) { rw += dx; }
        if (dragMode.includes("n")) { ry += dy; rh -= dy; }
        if (dragMode.includes("s")) { rh += dy; }
        if (rw < 10) rw = 10; if (rh < 10) rh = 10;
      }
      Object.assign(o, c2n(rx, ry, rw, rh));
    }
    draw(); updateProps(); updateExport(); save();
    document.getElementById("status-sel").textContent =
      `${o.label}: ${o.nw.toFixed(3)}×${o.nh.toFixed(3)}` + (o.nr > 0 ? ` r:${o.nr.toFixed(3)}` : "");
    return;
  }
  canvas.style.cursor = getCursor(hitTest(x, y));
});

canvas.addEventListener("mouseup", () => { if (dragMode) { dragMode = null; dragStart = null; updateList(); updateExport(); save(); } });
canvas.addEventListener("mouseleave", () => { crossH.style.display = "none"; crossV.style.display = "none"; if (dragMode) { dragMode = null; dragStart = null; } });

// ===========================================================================
//  Keyboard
// ===========================================================================
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "Delete" && selectedIdx >= 0) deleteSelected();
  if (e.ctrlKey && e.key === "d") { e.preventDefault(); duplicateSelected(); }
  if (e.ctrlKey && e.key === "a") { e.preventDefault(); addObstacle(); }
  if (e.key === "1") togglePanel("fp-obstacles");
  if (e.key === "2") togglePanel("fp-props");
  if (e.key === "3") togglePanel("fp-export");
  if (e.key === "h" || e.key === "H") toggleHelp();
});

// ===========================================================================
//  Actions
// ===========================================================================
function addObstacle() {
  obstacles.push({ nx: 0.4, ny: 0.4, nw: 0.1, nh: 0.1, nr: 0, label: "New Obstacle" });
  selectedIdx = obstacles.length - 1;
  refresh(); showToast("Obstacle added");
}
function duplicateSelected() {
  if (selectedIdx < 0) return;
  const s = obstacles[selectedIdx];
  obstacles.push({ nx: r4(s.nx + 0.02), ny: r4(s.ny + 0.02), nw: s.nw, nh: s.nh, nr: s.nr, label: s.label + " copy" });
  selectedIdx = obstacles.length - 1;
  refresh(); showToast("Duplicated");
}
function deleteSelected() {
  if (selectedIdx < 0) return;
  const n = obstacles[selectedIdx].label;
  obstacles.splice(selectedIdx, 1); selectedIdx = -1;
  refresh(); showToast(`Deleted "${n}"`);
}
function clearAll() { if (!confirm("Delete ALL obstacles?")) return; obstacles = []; selectedIdx = -1; refresh(); showToast("All cleared"); }
function resetDefaults() { if (!confirm("Reset to default obstacles?")) return; obstacles = structuredClone(DEFAULT_OBSTACLES); selectedIdx = -1; refresh(); showToast("Reset to defaults"); }
function refresh() { draw(); updateList(); updateProps(); updateExport(); syncCounts(); save(); }

// ===========================================================================
//  UI Updates
// ===========================================================================
function updateList() {
  const el = document.getElementById("obstacle-list");
  el.innerHTML = "";
  obstacles.forEach((o, i) => {
    const div = document.createElement("div");
    div.className = "obs-item" + (i === selectedIdx ? " selected" : "");
    div.innerHTML = `<div class="dot"></div><div class="lbl">${i}: ${o.label || "unnamed"}</div><div class="coords">${o.nx.toFixed(3)}, ${o.ny.toFixed(3)}</div>`;
    div.addEventListener("click", () => { selectedIdx = i; draw(); updateList(); updateProps(); });
    el.appendChild(div);
  });
  syncCounts();
  if (selectedIdx >= 0) {
    const o = obstacles[selectedIdx];
    document.getElementById("status-sel").textContent = `${o.label}: ${o.nw.toFixed(3)}×${o.nh.toFixed(3)}` + (o.nr > 0 ? ` r:${o.nr.toFixed(3)}` : "");
  } else {
    document.getElementById("status-sel").textContent = "No selection";
  }
}

function syncCounts() {
  const n = obstacles.length;
  document.getElementById("panel-count").textContent = n;
  document.getElementById("nav-count").textContent = n;
}

function updateProps() {
  const el = document.getElementById("props-content");
  if (selectedIdx < 0) { el.innerHTML = '<div id="no-selection">Select an obstacle</div>'; return; }
  const o = obstacles[selectedIdx];
  el.innerHTML = `
    <div class="section-title">Properties</div>
    <div class="row"><label>LBL</label><input type="text" id="prop-label" value="${escHtml(o.label || "")}"></div>
    <div class="row"><label>nX</label><input type="number" id="prop-nx" step="0.001" value="${o.nx}"><label>nY</label><input type="number" id="prop-ny" step="0.001" value="${o.ny}"></div>
    <div class="row"><label>nW</label><input type="number" id="prop-nw" step="0.001" value="${o.nw}"><label>nH</label><input type="number" id="prop-nh" step="0.001" value="${o.nh}"></div>
    <div class="row radius-row"><label style="color:var(--cyan)">R</label><input type="number" id="prop-nr" step="0.01" min="0" max="0.5" value="${o.nr}"></div>
  `;
  const bind = (id, key, isNum) => {
    document.getElementById(id).addEventListener("input", (ev) => {
      obstacles[selectedIdx][key] = isNum ? parseFloat(ev.target.value) || 0 : ev.target.value;
      draw(); updateList(); updateExport(); save();
    });
  };
  bind("prop-label", "label", false);
  bind("prop-nx", "nx", true); bind("prop-ny", "ny", true);
  bind("prop-nw", "nw", true); bind("prop-nh", "nh", true);
  bind("prop-nr", "nr", true);
}

function escHtml(s) { return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

function updateExport() {
  const box = document.getElementById("export-box");
  const lines = obstacles.map(o => {
    const nr = o.nr ? `, nr: ${o.nr}` : "";
    return `  { nx: ${o.nx}, ny: ${o.ny}, nw: ${o.nw}, nh: ${o.nh}${nr}, label: "${(o.label || "").replace(/"/g, '\\"')}" },`;
  });
  box.value = `export const MAP_OBSTACLES = [\n${lines.join("\n")}\n];\n`;
}

function doImport() {
  const raw = document.getElementById("export-box").value.trim();
  try {
    let js = raw;
    const m = raw.match(/\[[\s\S]*\]/);
    if (m) js = m[0];
    js = js.replace(/(\w+)\s*:/g, '"$1":');
    js = js.replace(/,\s*([\]}])/g, "$1");
    const arr = JSON.parse(js);
    if (!Array.isArray(arr)) throw new Error("Not an array");
    for (const o of arr) {
      if (typeof o.nx !== "number" || typeof o.ny !== "number" || typeof o.nw !== "number" || typeof o.nh !== "number") throw new Error("Missing nx/ny/nw/nh");
      if (typeof o.nr !== "number") o.nr = 0;
      o.label = o.label || "imported";
    }
    obstacles = arr; selectedIdx = -1;
    refresh(); showToast(`Imported ${arr.length} obstacles`);
  } catch (err) { alert("Import failed: " + err.message); }
}

function save() { localStorage.setItem("dv_editor_obstacles", JSON.stringify(obstacles)); }

// ===========================================================================
//  Button Wiring
// ===========================================================================
document.getElementById("btn-add").addEventListener("click", addObstacle);
document.getElementById("btn-dup").addEventListener("click", duplicateSelected);
document.getElementById("btn-del").addEventListener("click", deleteSelected);
document.getElementById("btn-clear").addEventListener("click", clearAll);
document.getElementById("btn-reset").addEventListener("click", resetDefaults);
document.getElementById("btn-copy").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("export-box").value).then(() => showToast("Copied!"));
});
document.getElementById("btn-import").addEventListener("click", doImport);

init();
</script>
</body>
</html>
