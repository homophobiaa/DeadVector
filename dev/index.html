<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadVector — Dev Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ========================================
   DeadVector Dev Panel
   ======================================== */

/* ---- Reset & Tokens ---- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-0: #08090c;
  --bg-1: #0e1014;
  --bg-2: #14161c;
  --bg-3: #1a1d25;
  --bg-4: #22252f;
  --border: #2a2d38;
  --border-hi: #3a3e4d;
  --text-0: #eaedf6;
  --text-1: #b0b5c5;
  --text-2: #6e7385;
  --text-3: #454a5a;
  --accent: #ff3a3a;
  --accent-dim: #cc2020;
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.15);
  --yellow: #ffd544;
  --cyan: #44d4ff;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', 'Consolas', monospace;
  --font-ui: 'Inter', 'Segoe UI', sans-serif;
  --radius: 8px;
  --radius-sm: 5px;
  --transition: 0.18s ease;
}

body {
  background: var(--bg-0);
  color: var(--text-1);
  font-family: var(--font-ui);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

/* ---- Top Nav Bar ---- */
#topnav {
  height: 48px;
  min-height: 48px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: relative;
  z-index: 20;
}
#topnav::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
  opacity: 0.3;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-brand .logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
}
.nav-brand .divider {
  width: 1px;
  height: 20px;
  background: var(--border);
}
.nav-brand .subtitle {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.nav-tabs {
  display: flex;
  gap: 2px;
  margin-left: 24px;
}
.nav-tab {
  padding: 6px 16px;
  background: transparent;
  color: var(--text-2);
  border: none;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  transition: all var(--transition);
  position: relative;
  letter-spacing: 0.3px;
}
.nav-tab:hover { color: var(--text-1); background: var(--bg-2); }
.nav-tab.active {
  color: var(--green);
  background: var(--bg-2);
}
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  border-radius: 2px 2px 0 0;
}
.nav-spacer { flex: 1; }
.nav-status {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-3);
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.nav-back {
  padding: 5px 12px;
  background: var(--bg-3);
  color: var(--text-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
}
.nav-back:hover { color: var(--text-0); border-color: var(--border-hi); background: var(--bg-4); }

/* ---- Main Layout ---- */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ---- Panel (Left Sidebar) ---- */
#panel {
  width: 360px;
  min-width: 360px;
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-header .icon {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #fff;
  flex-shrink: 0;
}
.panel-header h2 {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-0);
  letter-spacing: 1px;
}
.panel-header .count {
  margin-left: auto;
  background: var(--bg-4);
  color: var(--text-2);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-family: var(--font-mono);
}

/* ---- Toolbar ---- */
.toolbar {
  display: flex;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.btn {
  padding: 6px 14px;
  background: var(--bg-3);
  color: var(--text-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--bg-4); border-color: var(--border-hi); color: var(--text-0); }
.btn:active { transform: scale(0.97); }
.btn.primary { color: var(--green); border-color: rgba(0,255,136,0.25); }
.btn.primary:hover { background: var(--green-dim); border-color: rgba(0,255,136,0.4); }
.btn.danger { color: #ff6b6b; border-color: rgba(255,60,60,0.2); }
.btn.danger:hover { background: rgba(255,60,60,0.08); border-color: rgba(255,60,60,0.35); }

/* ---- Obstacle List ---- */
#obstacle-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.obs-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.12s;
}
.obs-item:hover { background: var(--bg-2); }
.obs-item.selected {
  background: rgba(0,255,136,0.05);
  border-left-color: var(--green);
}
.obs-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  background: var(--accent);
  flex-shrink: 0;
  transition: background 0.15s;
}
.obs-item.selected .dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
.obs-item .lbl {
  flex: 1;
  font-size: 12px;
  color: var(--text-1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.obs-item.selected .lbl { color: var(--text-0); }
.obs-item .coords {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-3);
}

/* ---- Properties Panel ---- */
#props {
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  background: var(--bg-2);
}
#props .section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}
#props .row {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  align-items: center;
}
#props label {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-3);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
  text-transform: uppercase;
}
#props input[type="number"],
#props input[type="text"] {
  flex: 1;
  background: var(--bg-0);
  border: 1px solid var(--border);
  color: var(--text-0);
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--font-mono);
  transition: border-color var(--transition);
}
#props input:focus { outline: none; border-color: var(--green); }
#no-selection {
  color: var(--text-3);
  font-size: 12px;
  font-style: italic;
  text-align: center;
  padding: 8px 0;
}

/* ---- Export Panel ---- */
#export-panel {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  background: var(--bg-1);
}
#export-panel .section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
#export-box {
  width: 100%;
  height: 110px;
  background: var(--bg-0);
  color: var(--green);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  font-size: 10px;
  font-family: var(--font-mono);
  resize: vertical;
  line-height: 1.5;
  transition: border-color var(--transition);
}
#export-box:focus { outline: none; border-color: var(--green); }
#export-panel .actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
#export-panel .actions .btn { flex: 1; text-align: center; }

/* ---- Canvas Viewport ---- */
#viewport {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-0);
}
#viewport canvas {
  position: absolute;
  top: 0; left: 0;
}

/* ---- Status Bar (bottom of viewport) ---- */
#statusbar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 28px;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 18px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-3);
  z-index: 10;
}
#statusbar .separator {
  width: 1px;
  height: 12px;
  background: var(--border);
}

/* ---- Help Overlay ---- */
#helpbar {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(14,16,20,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  z-index: 10;
  pointer-events: none;
}
#helpbar .help-title {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 6px;
}
#helpbar .help-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
  font-size: 11px;
  color: var(--text-2);
}
#helpbar kbd {
  display: inline-block;
  background: var(--bg-4);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-1);
  min-width: 22px;
  text-align: center;
}

/* ---- Toast notification ---- */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--bg-3);
  color: var(--green);
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: var(--radius);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---- Scanline overlay (subtle) ---- */
#viewport::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 5;
}

/* ---- Crosshair overlay ---- */
#crosshair-h, #crosshair-v {
  position: absolute;
  background: rgba(0,255,136,0.08);
  pointer-events: none;
  z-index: 4;
  display: none;
}
#crosshair-h { height: 1px; left: 0; right: 0; }
#crosshair-v { width: 1px; top: 0; bottom: 0; }
</style>
</head>
<body>

<!-- ---- Top Nav ---- -->
<nav id="topnav">
  <div class="nav-brand">

    <div class="divider"></div>

  <div class="nav-tabs">

<!-- ---- Main Area ---- -->
<div id="main">
  <!-- ---- Left Panel ---- -->
  <aside id="panel">

      <span id="status-mouse">X: 0 Y: 0</span>

      <span id="status-norm">nX: 0 nY: 0</span>
      <div class="separator"></div>
      <span id="status-selected">No selection</span>
      <div class="separator"></div>
      <span id="status-zoom">Zoom: 1.12x</span>
    </div>
  </section>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===========================================================================
//  DeadVector Map Obstacle Editor
// ===========================================================================

const BG_SRC = "../assets/images/background.png";
const HANDLE_SIZE = 7;
const ZOOM = 1.12;

let obstacles = [];
let selectedIdx = -1;
let bgImg = new Image();
let bgTransform = { x: 0, y: 0, w: 0, h: 0 };

let dragMode = null;
let dragStart = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const viewport = document.getElementById("viewport");
const crossH = document.getElementById("crosshair-h");
const crossV = document.getElementById("crosshair-v");

// ---- Default obstacles ----
const DEFAULT_OBSTACLES = [
  { nx: 0.275, ny: -0.01, nw: 0.445, nh: 0.225, label: "Top Building" },
  { nx: 0.245, ny: 0.79, nw: 0.48, nh: 0.22, label: "Bottom Building" },
  { nx: -0.01, ny: -0.01, nw: 0.13, nh: 0.225, label: "TL Corner" },
  { nx: 0.875, ny: -0.01, nw: 0.135, nh: 0.225, label: "TR Corner" },
  { nx: -0.01, ny: 0.79, nw: 0.10, nh: 0.22, label: "BL Corner" },
  { nx: 0.91, ny: 0.79, nw: 0.10, nh: 0.22, label: "BR Corner" },
  { nx: 0.175, ny: 0.02, nw: 0.07, nh: 0.07, label: "Car TL" },
  { nx: -0.005, ny: 0.30, nw: 0.05, nh: 0.12, label: "Car L1" },
  { nx: -0.005, ny: 0.57, nw: 0.055, nh: 0.12, label: "Car L2" },
  { nx: 0.075, ny: 0.845, nw: 0.06, nh: 0.06, label: "Car BL" },
  { nx: 0.815, ny: 0.86, nw: 0.065, nh: 0.06, label: "Car BR" },
];

// ---- Toast ----
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

// ---- Init ----
function init() {
  const saved = localStorage.getItem("dv_editor_obstacles");
  if (saved) {
    try { obstacles = JSON.parse(saved); } catch { obstacles = structuredClone(DEFAULT_OBSTACLES); }
  } else {
    obstacles = structuredClone(DEFAULT_OBSTACLES);
  }

  bgImg.onload = () => { resizeCanvas(); draw(); };
  bgImg.src = BG_SRC;

  window.addEventListener("resize", () => { resizeCanvas(); draw(); });
  resizeCanvas();
  draw();
  updateList();
  updateExport();
  syncCounts();
}

// ---- Layout ----
function resizeCanvas() {
  const rect = viewport.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const h = rect.height - 28; // account for statusbar
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = rect.width + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeBg(rect.width, h);
}

function computeBg(cw, ch) {
  if (!bgImg.naturalWidth) return;
  const imgAspect = bgImg.naturalWidth / bgImg.naturalHeight;
  const canAspect = cw / ch;
  let dw, dh;
  if (canAspect > imgAspect) { dw = cw * ZOOM; dh = dw / imgAspect; }
  else { dh = ch * ZOOM; dw = dh * imgAspect; }
  bgTransform = { x: (cw - dw) / 2, y: (ch - dh) / 2, w: dw, h: dh };
}

// ---- Coord helpers ----
function normToCanvas(o) {
  const bt = bgTransform;
  return { x: bt.x + o.nx * bt.w, y: bt.y + o.ny * bt.h, w: o.nw * bt.w, h: o.nh * bt.h };
}
function canvasToNorm(x, y, w, h) {
  const bt = bgTransform;
  return { nx: r4((x - bt.x) / bt.w), ny: r4((y - bt.y) / bt.h), nw: r4(w / bt.w), nh: r4(h / bt.h) };
}
function r4(v) { return Math.round(v * 10000) / 10000; }

// ---- Drawing ----
function draw() {
  const rect = viewport.getBoundingClientRect();
  const cw = rect.width;
  const ch = rect.height - 28;
  ctx.clearRect(0, 0, cw, ch);

  // Background
  if (bgImg.naturalWidth) {
    ctx.drawImage(bgImg, bgTransform.x, bgTransform.y, bgTransform.w, bgTransform.h);
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0, 0, cw, ch);
  } else {
    ctx.fillStyle = "#0a0a0e";
    ctx.fillRect(0, 0, cw, ch);
    ctx.fillStyle = "#333";
    ctx.font = "14px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Loading background...", cw / 2, ch / 2);
    ctx.textAlign = "start";
  }

  // Grid overlay (subtle)
  ctx.strokeStyle = "rgba(0,255,136,0.04)";
  ctx.lineWidth = 0.5;
  const gs = 60;
  for (let x = bgTransform.x % gs; x < cw; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke();
  }
  for (let y = bgTransform.y % gs; y < ch; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
  }

  // Obstacles
  for (let i = 0; i < obstacles.length; i++) {
    const sel = i === selectedIdx;
    const r = normToCanvas(obstacles[i]);
    drawObstacle(r, obstacles[i].label, sel, i);
  }
}

function drawObstacle(r, label, selected, idx) {
  // Fill
  if (selected) {
    ctx.fillStyle = "rgba(0,255,136,0.12)";
  } else {
    ctx.fillStyle = "rgba(255,58,58,0.08)";
  }
  ctx.fillRect(r.x, r.y, r.w, r.h);

  // Border
  ctx.strokeStyle = selected ? "rgba(0,255,136,0.9)" : "rgba(255,58,58,0.5)";
  ctx.lineWidth = selected ? 2 : 1;
  ctx.setLineDash(selected ? [] : [5, 4]);
  ctx.strokeRect(r.x, r.y, r.w, r.h);
  ctx.setLineDash([]);

  // Diagonal hash fill for selected
  if (selected) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(r.x, r.y, r.w, r.h);
    ctx.clip();
    ctx.strokeStyle = "rgba(0,255,136,0.06)";
    ctx.lineWidth = 1;
    const step = 12;
    for (let d = -Math.max(r.w, r.h); d < Math.max(r.w, r.h) * 2; d += step) {
      ctx.beginPath();
      ctx.moveTo(r.x + d, r.y);
      ctx.lineTo(r.x + d - r.h, r.y + r.h);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Label badge
  const labelText = `${idx}: ${label || "unnamed"}`;
  ctx.font = "bold 10px 'Share Tech Mono', Consolas, monospace";
  const tw = ctx.measureText(labelText).width;
  const badgeH = 16;
  const badgeY = r.y - badgeH - 2;
  const bgColor = selected ? "rgba(0,255,136,0.85)" : "rgba(255,58,58,0.75)";
  const textColor = selected ? "#000" : "#fff";

  if (badgeY > 0) {
    // Draw badge above
    ctx.fillStyle = bgColor;
    roundRect(ctx, r.x, badgeY, tw + 10, badgeH, 3);
    ctx.fill();
    ctx.fillStyle = textColor;
    ctx.fillText(labelText, r.x + 5, badgeY + 11);
  } else {
    // Inside top
    ctx.fillStyle = bgColor;
    roundRect(ctx, r.x + 2, r.y + 2, tw + 10, badgeH, 3);
    ctx.fill();
    ctx.fillStyle = textColor;
    ctx.fillText(labelText, r.x + 7, r.y + 13);
  }

  // Resize handles
  if (selected) {
    const handles = getHandles(r);
    for (const h of Object.values(handles)) {
      // Outer glow
      ctx.fillStyle = "rgba(0,255,136,0.2)";
      ctx.beginPath();
      ctx.arc(h.x, h.y, HANDLE_SIZE + 2, 0, Math.PI * 2);
      ctx.fill();
      // Handle
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(h.x, h.y, HANDLE_SIZE - 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,255,136,0.9)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(h.x, h.y, HANDLE_SIZE - 1, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Dimension text for selected
  if (selected) {
    const dimText = `${Math.round(r.w)}x${Math.round(r.h)}`;
    ctx.font = "9px 'Share Tech Mono', monospace";
    ctx.fillStyle = "rgba(0,255,136,0.5)";
    ctx.fillText(dimText, r.x + r.w / 2 - ctx.measureText(dimText).width / 2, r.y + r.h + 13);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function getHandles(r) {
  const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
  return {
    nw: { x: r.x, y: r.y }, n: { x: cx, y: r.y }, ne: { x: r.x + r.w, y: r.y },
    w: { x: r.x, y: cy }, e: { x: r.x + r.w, y: cy },
    sw: { x: r.x, y: r.y + r.h }, s: { x: cx, y: r.y + r.h }, se: { x: r.x + r.w, y: r.y + r.h },
  };
}

// ---- Hit test ----
function hitTest(mx, my) {
  if (selectedIdx >= 0) {
    const r = normToCanvas(obstacles[selectedIdx]);
    const handles = getHandles(r);
    for (const [dir, h] of Object.entries(handles)) {
      if (Math.abs(mx - h.x) < HANDLE_SIZE + 2 && Math.abs(my - h.y) < HANDLE_SIZE + 2) {
        return { type: "handle", idx: selectedIdx, dir };
      }
    }
    const ed = 6;
    if (mx >= r.x - ed && mx <= r.x + r.w + ed && my >= r.y - ed && my <= r.y + r.h + ed) {
      const nL = Math.abs(mx - r.x) < ed, nR = Math.abs(mx - (r.x + r.w)) < ed;
      const nT = Math.abs(my - r.y) < ed, nB = Math.abs(my - (r.y + r.h)) < ed;
      if (nT && nL) return { type: "handle", idx: selectedIdx, dir: "nw" };
      if (nT && nR) return { type: "handle", idx: selectedIdx, dir: "ne" };
      if (nB && nL) return { type: "handle", idx: selectedIdx, dir: "sw" };
      if (nB && nR) return { type: "handle", idx: selectedIdx, dir: "se" };
      if (nL && my > r.y && my < r.y + r.h) return { type: "handle", idx: selectedIdx, dir: "w" };
      if (nR && my > r.y && my < r.y + r.h) return { type: "handle", idx: selectedIdx, dir: "e" };
      if (nT && mx > r.x && mx < r.x + r.w) return { type: "handle", idx: selectedIdx, dir: "n" };
      if (nB && mx > r.x && mx < r.x + r.w) return { type: "handle", idx: selectedIdx, dir: "s" };
    }
  }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const r = normToCanvas(obstacles[i]);
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
      return { type: "body", idx: i };
    }
  }
  return null;
}

function getCursor(hit) {
  if (!hit) return "crosshair";
  if (hit.type === "body") return "move";
  const d = hit.dir;
  if (d === "n" || d === "s") return "ns-resize";
  if (d === "e" || d === "w") return "ew-resize";
  if (d === "nw" || d === "se") return "nwse-resize";
  if (d === "ne" || d === "sw") return "nesw-resize";
  return "crosshair";
}

// ---- Mouse events ----
function getMouse(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener("mousedown", (e) => {
  const { x, y } = getMouse(e);
  const hit = hitTest(x, y);
  if (!hit) { selectedIdx = -1; draw(); updateList(); updateProps(); return; }
  selectedIdx = hit.idx;
  const r = normToCanvas(obstacles[selectedIdx]);
  dragMode = hit.type === "body" ? "move" : hit.dir;
  dragStart = { mx: x, my: y, ox: r.x, oy: r.y, ow: r.w, oh: r.h };
  draw(); updateList(); updateProps();
});

canvas.addEventListener("mousemove", (e) => {
  const { x, y } = getMouse(e);

  // Crosshairs
  crossH.style.display = "block"; crossH.style.top = y + "px";
  crossV.style.display = "block"; crossV.style.left = x + "px";

  // Status bar mouse position
  document.getElementById("status-mouse").textContent = `X: ${Math.round(x)}  Y: ${Math.round(y)}`;
  const bt = bgTransform;
  if (bt.w > 0) {
    const nx = r4((x - bt.x) / bt.w);
    const ny = r4((y - bt.y) / bt.h);
    document.getElementById("status-norm").textContent = `nX: ${nx}  nY: ${ny}`;
  }

  if (dragMode && dragStart && selectedIdx >= 0) {
    const dx = x - dragStart.mx, dy = y - dragStart.my;
    let rx = dragStart.ox, ry = dragStart.oy, rw = dragStart.ow, rh = dragStart.oh;
    if (dragMode === "move") { rx += dx; ry += dy; }
    else {
      if (dragMode.includes("w")) { rx += dx; rw -= dx; }
      if (dragMode.includes("e")) { rw += dx; }
      if (dragMode.includes("n")) { ry += dy; rh -= dy; }
      if (dragMode.includes("s")) { rh += dy; }
      if (rw < 10) rw = 10;
      if (rh < 10) rh = 10;
    }
    const norm = canvasToNorm(rx, ry, rw, rh);
    Object.assign(obstacles[selectedIdx], norm);
    draw(); updateProps(); updateExport(); save();

    // Status bar selection info
    const o = obstacles[selectedIdx];
    document.getElementById("status-selected").textContent =
      `${o.label}: ${o.nw.toFixed(3)} x ${o.nh.toFixed(3)}`;
    return;
  }

  canvas.style.cursor = getCursor(hitTest(x, y));
});

canvas.addEventListener("mouseup", () => {
  if (dragMode) { dragMode = null; dragStart = null; updateList(); updateExport(); save(); }
});
canvas.addEventListener("mouseleave", () => {
  crossH.style.display = "none"; crossV.style.display = "none";
  if (dragMode) { dragMode = null; dragStart = null; }
});

// ---- Keyboard ----
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "Delete" && selectedIdx >= 0) deleteSelected();
  if (e.ctrlKey && e.key === "d") { e.preventDefault(); duplicateSelected(); }
  if (e.ctrlKey && e.key === "a") { e.preventDefault(); addObstacle(); }
});

// ---- Actions ----
function addObstacle() {
  obstacles.push({ nx: 0.4, ny: 0.4, nw: 0.1, nh: 0.1, label: "New Obstacle" });
  selectedIdx = obstacles.length - 1;
  refresh(); showToast("Obstacle added");
}

function duplicateSelected() {
  if (selectedIdx < 0) return;
  const s = obstacles[selectedIdx];
  obstacles.push({ nx: r4(s.nx + 0.02), ny: r4(s.ny + 0.02), nw: s.nw, nh: s.nh, label: s.label + " copy" });
  selectedIdx = obstacles.length - 1;
  refresh(); showToast("Duplicated");
}

function deleteSelected() {
  if (selectedIdx < 0) return;
  const name = obstacles[selectedIdx].label;
  obstacles.splice(selectedIdx, 1);
  selectedIdx = -1;
  refresh(); showToast(`Deleted "${name}"`);
}

function clearAll() {
  if (!confirm("Delete ALL obstacles?")) return;
  obstacles = []; selectedIdx = -1;
  refresh(); showToast("All cleared");
}

function resetDefaults() {
  if (!confirm("Reset to default obstacles?")) return;
  obstacles = structuredClone(DEFAULT_OBSTACLES);
  selectedIdx = -1;
  refresh(); showToast("Reset to defaults");
}

function refresh() {
  draw(); updateList(); updateProps(); updateExport(); syncCounts(); save();
}

// ---- Sidebar: list ----
function updateList() {
  const el = document.getElementById("obstacle-list");
  el.innerHTML = "";
  obstacles.forEach((o, i) => {
    const div = document.createElement("div");
    div.className = "obs-item" + (i === selectedIdx ? " selected" : "");
    div.innerHTML = `
      <div class="dot"></div>
      <div class="lbl">${i}: ${o.label || "unnamed"}</div>
      <div class="coords">${o.nx.toFixed(3)}, ${o.ny.toFixed(3)}</div>
    `;
    div.addEventListener("click", () => { selectedIdx = i; draw(); updateList(); updateProps(); });
    el.appendChild(div);
  });
  syncCounts();
  // Status bar
  if (selectedIdx >= 0) {
    const o = obstacles[selectedIdx];
    document.getElementById("status-selected").textContent =
      `${o.label}: ${o.nw.toFixed(3)} x ${o.nh.toFixed(3)}`;
  } else {
    document.getElementById("status-selected").textContent = "No selection";
  }
}

function syncCounts() {
  const n = obstacles.length;
  document.getElementById("panel-count").textContent = n;
  document.getElementById("nav-obstacle-count").textContent = `${n} obstacle${n !== 1 ? "s" : ""}`;
}

// ---- Sidebar: props ----
function updateProps() {
  const el = document.getElementById("props-content");
  if (selectedIdx < 0) {
    el.innerHTML = '<div id="no-selection">Select an obstacle</div>';
    return;
  }
  const o = obstacles[selectedIdx];
  el.innerHTML = `
    <div class="row">
      <label>LBL</label>
      <input type="text" id="prop-label" value="${escHtml(o.label || "")}" />
    </div>
    <div class="row">
      <label>nX</label>
      <input type="number" id="prop-nx" step="0.001" value="${o.nx}" />
      <label>nY</label>
      <input type="number" id="prop-ny" step="0.001" value="${o.ny}" />
    </div>
    <div class="row">
      <label>nW</label>
      <input type="number" id="prop-nw" step="0.001" value="${o.nw}" />
      <label>nH</label>
      <input type="number" id="prop-nh" step="0.001" value="${o.nh}" />
    </div>
  `;
  const bind = (id, key, isNum) => {
    document.getElementById(id).addEventListener("input", (ev) => {
      obstacles[selectedIdx][key] = isNum ? parseFloat(ev.target.value) || 0 : ev.target.value;
      draw(); updateList(); updateExport(); save();
    });
  };
  bind("prop-label", "label", false);
  bind("prop-nx", "nx", true);
  bind("prop-ny", "ny", true);
  bind("prop-nw", "nw", true);
  bind("prop-nh", "nh", true);
}

function escHtml(s) { return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

// ---- Export ----
function updateExport() {
  const box = document.getElementById("export-box");
  const lines = obstacles.map(o => {
    return `  { nx: ${o.nx}, ny: ${o.ny}, nw: ${o.nw}, nh: ${o.nh}, label: "${(o.label || "").replace(/"/g, '\\"')}" },`;
  });
  box.value = `export const MAP_OBSTACLES = [\n${lines.join("\n")}\n];\n`;
}

// ---- Import ----
function doImport() {
  const raw = document.getElementById("export-box").value.trim();
  try {
    let jsonStr = raw;
    const arrMatch = raw.match(/\[[\s\S]*\]/);
    if (arrMatch) jsonStr = arrMatch[0];
    jsonStr = jsonStr.replace(/(\w+)\s*:/g, '"$1":');
    jsonStr = jsonStr.replace(/,\s*([\]}])/g, '$1');
    const arr = JSON.parse(jsonStr);
    if (!Array.isArray(arr)) throw new Error("Not an array");
    for (const o of arr) {
      if (typeof o.nx !== "number" || typeof o.ny !== "number" ||
          typeof o.nw !== "number" || typeof o.nh !== "number") throw new Error("Missing nx/ny/nw/nh");
      o.label = o.label || "imported";
    }
    obstacles = arr; selectedIdx = -1;
    refresh();
    showToast(`Imported ${arr.length} obstacles`);
  } catch (err) {
    alert("Import failed: " + err.message);
  }
}

// ---- Persist ----
function save() { localStorage.setItem("dv_editor_obstacles", JSON.stringify(obstacles)); }

// ---- Button wiring ----
document.getElementById("btn-add").addEventListener("click", addObstacle);
document.getElementById("btn-dup").addEventListener("click", duplicateSelected);
document.getElementById("btn-del").addEventListener("click", deleteSelected);
document.getElementById("btn-clear").addEventListener("click", clearAll);
document.getElementById("btn-reset").addEventListener("click", resetDefaults);
document.getElementById("btn-copy").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("export-box").value).then(() => {
    showToast("Copied to clipboard!");
  });
});
document.getElementById("btn-import").addEventListener("click", doImport);

// ---- Start ----
init();
</script>
</body>
</html>
